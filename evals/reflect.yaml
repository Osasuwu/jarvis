# Eval: reflect skill
# Tests whether reflect skill successfully executes cross-session behavioral audit.

skill: reflect
version: 1.0.0

cases:
  - id: phase_a_extract_per_device
    description: "Phase A should extract session data and produce per-device patterns file"
    check_type: manual
    note: "Verify reflect Phase A generates {DEVICE}_patterns.json in ~/.cache/jarvis-comms-analysis/"

  - id: phase_a_stats_inline
    description: "Phase A prints aggregate stats (session count, interactive sessions, corrective count)"
    check_type: manual
    note: "Check output contains 'interactive sessions: N' and corrective pattern counts"

  - id: phase_b_merge_files
    description: "Phase B reads multiple device patterns files and merges them"
    check_type: manual
    note: "Verify Phase B requires >=2 device patterns files and produces merged_patterns.json"

  - id: phase_b_confidence_ranking
    description: "Phase B outputs confidence-ranked patterns from merged analysis"
    check_type: manual
    note: "Check console output shows confidence_score rankings for cross-device patterns"

  - id: phase_b_agent_analysis
    description: "Phase B spawns agent for qualitative analysis of merged patterns"
    check_type: manual
    note: "Verify Phase B agent receives merged_patterns.json and produces report_{DATE}.md"

  - id: report_contains_corrective_patterns
    description: "Final report includes all corrective patterns with confidence levels"
    check_type: manual
    note: "Check report_{DATE}.md contains corrective pattern names + confidence (high/medium/low)"

  - id: report_contains_affirmatives
    description: "Final report includes what Jarvis does well (affirmative patterns)"
    check_type: manual
    note: "Check report documents affirmative patterns and working interaction styles"

  - id: report_contains_feedback_rules
    description: "Report includes candidate feedback rules with why + how to apply"
    check_type: manual
    note: "Verify each rule has format: Rule / Why (with confidence) / How to apply"

  - id: no_autowrite_to_memory
    description: "Reflect does NOT auto-write to memory; requires user confirmation"
    check_type: manual
    note: "Verify skill offers 'Save N rules to memory?' prompt, user must confirm"

  - id: no_artifacts_in_repo
    description: "Output artifacts only go to ~/.cache, never committed to jarvis repo"
    check_type: manual
    note: "Confirm comms_extract.jsonl, patterns files, reports are in ~/.cache only"
