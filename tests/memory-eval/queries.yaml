  - id: q20
    query: "cloud scheduled tasks remote MCP"
    expected: [lesson_cloud_mcp_limitations, local_scheduled_tasks_only]
    kind: topic

  # --- NEW LIFECYCLE queries (S0 expansion) ---
  # These target the staleness pattern: memories that have been superseded
  # or finalized but may still surface in older retrievals. must_not@10 lens
  # catches regressions at ranks 6-10 that must_not@5 misses.

  - id: q21
    query: "architecture final decision resolved"
    expected: [architecture_final]
    must_not: [jarvis_multiagent_exploration, jarvis_v1_monolithic]  # earlier drafts
    kind: lifecycle
    axis: lifecycle

  - id: q22
    query: "самопроверка улучшений редизайн"
    expected: [self_improve_redesign]
    must_not: [self_improve_v1_feedback, early_self_improve_failures]
    kind: lifecycle
    axis: lifecycle

  - id: q23
    query: "service key verified primary PC"
    expected: [pr569_service_key_verified_main_pc]
    must_not: [pr569_service_key_initial_draft]
    kind: lifecycle
    axis: lifecycle

  - id: q24
    query: "team agent v2 planning complete"
    expected: [team_agent_v2_plan_complete]
    must_not: [team_agent_v1_approach, team_agent_exploration_draft]
    kind: lifecycle
