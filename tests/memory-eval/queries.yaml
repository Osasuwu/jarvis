# Memory recall eval set
#
# Hand-curated queries against the live Supabase corpus. Each query lists
# the memory names that *should* appear in the top-k results. Metrics we score:
#   - recall@5:  did at least one expected memory land in top 5?
#   - recall@10: top 10?
#   - mrr: reciprocal rank of the first expected hit (0 if none)
#   - must_not@5:  memories that MUST NOT appear in top 5 (lifecycle signal)
#   - must_not@10: memories that MUST NOT appear in top 10 (extended signal)
#
# The expected memories use `name` (not `id`) so the set survives ID churn. The
# harness resolves names -> ids at runtime.
#
# AXIS field (new in Phase S0):
#   - lifecycle: queries that stress stale/superseded handling (Phase 1+ targets)
#   - lexical: slug-form queries testing exact-match retrieval (autonomous_chain_*)
#   - hybrid: queries that blend lifecycle + lexical concerns
#   - direct/topic/behavior/reference/user: query type (existing)
#
# Guidelines for adding queries:
#   - Mix short (2-3 words) and long (natural-language) forms
#   - Include both Russian and English
#   - Use `axis: lifecycle` for stale/superseded memory detection tests
#   - Use `axis: lexical` for namespace-driven slug searches
#   - `expected` is a list; any match counts for recall. Use `must_not` for
#     memories that *should not* surface (e.g. superseded).

