  - id: q25
    query: "goal tracking system finalized"
    expected: [goal_system_final_shape]
    must_not: [goal_tracking_v1_iteration, goal_experiment_abandoned]
    kind: lifecycle
    axis: lifecycle

  # --- LEXICAL-AXIS queries (S0 expansion) ---
  # Slug-form queries testing namespace-specific retrieval: autonomous_chain_*
  # These stress exact-match and keyword precision over semantic similarity.

  - id: q26
    query: "autonomous_chain_step_handler"
    expected: [autonomous_chain_step_handler]
    kind: reference
    axis: lexical

  - id: q27
    query: "autonomous chain queue manager"
