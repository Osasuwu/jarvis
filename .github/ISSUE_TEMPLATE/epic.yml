name: "Epic"
description: "Group of related tasks that deliver a capability."
labels: ["epic"]
body:
  - type: textarea
    id: summary
    attributes:
      label: "Summary"
      description: "What capability will this epic deliver?"
    validations:
      required: true

  - type: textarea
    id: children
    attributes:
      label: "Children"
      description: "List child tasks/bugs only. Use '- [ ] #NNN description' and link them as GitHub sub-issues."
      value: |
        - [ ]
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: "Primary Area"
      options:
        - "area:skills"
        - "area:config"
        - "area:infrastructure"
        - "area:quality"
        - "area:docs"
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: "Priority"
      options:
        - "priority:critical"
        - "priority:high"
        - "priority:medium"
        - "priority:low"
    validations:
      required: true

  - type: dropdown
    id: phase
    attributes:
      label: "Phase"
      options:
        - "P1 OpenClaw Migration + PM Skills"
        - "P2 Research Skills"
        - "P3 Expansion"
    validations:
      required: true

  - type: textarea
    id: done
    attributes:
      label: "Definition of Done"
      description: "What must be true for this epic to be considered complete?"
      value: |
        - [ ] All child issues closed
        - [ ] Integration verified
        - [ ] Release notes/process notes updated if needed
    validations:
      required: true
