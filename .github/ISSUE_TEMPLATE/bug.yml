name: "Bug Report"
description: "Report a bug or unexpected behavior."
labels: ["bug"]
body:
  - type: input
    id: parent
    attributes:
      label: "Parent Epic (if tracked)"
      description: "Link to parent epic if this bug is part of a tracked effort, e.g. #42"
      placeholder: "#"
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: "Bug Description"
      description: "What went wrong?"
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: "Steps to Reproduce"
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "Expected Behavior"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: "Actual Behavior"
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: "Area"
      options:
        - "area:core-agent"
        - "area:workflow-github"
        - "area:tools"
        - "area:quality"
        - "area:docs"
        - "area:release"
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: "Priority"
      options:
        - "priority:critical"
        - "priority:high"
        - "priority:medium"
        - "priority:low"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: "Additional Context"
      description: "Logs, screenshots, environment details."
    validations:
      required: false
