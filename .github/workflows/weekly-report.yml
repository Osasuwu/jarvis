name: Weekly Project Report

on:
  schedule:
    - cron: '0 17 * * 5'
  workflow_dispatch:

concurrency:
  group: weekly-report
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const repo = { owner: context.repo.owner, repo: context.repo.repo };

            const now = new Date();
            const weekAgo = new Date();
            weekAgo.setDate(now.getDate() - 7);
            const since = weekAgo.toISOString();

            const utcDate = new Date(Date.UTC(now.getFullYear(), now.getMonth(), now.getDate()));
            const dayOfWeek = utcDate.getUTCDay() || 7;
            utcDate.setUTCDate(utcDate.getUTCDate() + 4 - dayOfWeek);
            const isoYear = utcDate.getUTCFullYear();
            const yearStart = new Date(Date.UTC(isoYear, 0, 1));
            const weekNum = Math.ceil(((utcDate - yearStart) / 86400000 + 1) / 7);
            const weekStr = String(weekNum).padStart(2, '0');
            const filename = `${isoYear}-W${weekStr}.md`;

            const { data: closedIssues } = await github.rest.issues.listForRepo({
              ...repo,
              state: 'closed',
              since,
              per_page: 100,
            });
            const closedThisWeek = closedIssues.filter(i => !i.pull_request && i.closed_at && new Date(i.closed_at) >= weekAgo);

            const closedPRs = await github.paginate(github.rest.pulls.list, {
              ...repo,
              state: 'closed',
              sort: 'updated',
              direction: 'desc',
              per_page: 100,
            });
            const mergedThisWeek = closedPRs.filter(pr => pr.merged_at && new Date(pr.merged_at) >= weekAgo);

            const { data: openIssues } = await github.rest.issues.listForRepo({ ...repo, state: 'open', per_page: 100 });
            const openOnly = openIssues.filter(i => !i.pull_request);

            let md = `# Weekly Report - ${now.toISOString().split('T')[0]}\n\n`;
            md += `## Closed Issues (${closedThisWeek.length})\n\n`;
            md += closedThisWeek.length === 0 ? 'No issues closed this week.\n\n' : closedThisWeek.map(i => `- [x] #${i.number} ${i.title}`).join('\n') + '\n\n';

            md += `## Merged PRs (${mergedThisWeek.length})\n\n`;
            md += mergedThisWeek.length === 0 ? 'No PRs merged this week.\n\n' : mergedThisWeek.map(pr => `- #${pr.number} ${pr.title} (@${pr.user.login})`).join('\n') + '\n\n';

            md += `## Open Issues\n\n`;
            md += `Total open: ${openOnly.length}\n\n`;
            md += '---\nAuto-generated by weekly-report workflow\n';

            fs.mkdirSync('reports', { recursive: true });
            fs.writeFileSync(`reports/${filename}`, md);

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "docs: weekly report"
          git push
