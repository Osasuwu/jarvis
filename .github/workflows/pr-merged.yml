name: PR Merged

# Explicitly closes a merged PR's linked issues. GitHub's NATIVE linked-issue
# auto-close does NOT fire for automated (bot / GitHub-App) merges — its
# recursion-prevention suppresses the close even with a valid `Closes #N`, the
# repo setting ON, and `closingIssuesReferences` populated (#948 Bug A; proven
# live on #1006/#1005; decision 1b0cbbcc; memory
# github_token_merge_suppresses_native_issue_autoclose). The App-token merge in
# auto-merge-enable.yml un-suppresses THIS `pull_request: closed` event (a
# GITHUB_TOKEN merge would suppress it too), so this workflow is the deterministic
# close path. It uses the authoritative `closingIssuesReferences` linkage — the
# exact set native auto-close would have closed — not a body regex.

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  close-linked-issues:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: read
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_TITLE: ${{ github.event.pull_request.title }}
      MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
      MERGED_AT: ${{ github.event.pull_request.merged_at }}
    steps:
      - name: Close linked issues
        run: |
          set -euo pipefail
          : "${MERGED_AT:?merged_at missing on a merged PR event}"

          # Authoritative closing linkage (same set GitHub's native auto-close
          # targets) — not a body regex, so malformed refs can't leak in. Each ref
          # carries its OWN repo: a PR can reference a cross-repo issue via
          # `Closes owner/other#N`. We project the ref's repo slug alongside
          # the number so a foreign ref is *detected* — but GITHUB_TOKEN is scoped
          # to $REPO only and cannot close issues in another repo (the permissions:
          # block grants nothing outside $REPO). So foreign refs are SKIPPED with a
          # warning in the loop below, NOT closed and NOT collapsed into $REPO
          # (which would close the wrong same-numbered issue). Cross-repo close
          # would need a PAT/App token with write scope on the other repo.
          #
          # Capture-then-check, NOT a mapfile-from-process-substitution read
          # (`< <(gh pr view …)`): a process-substitution failure is invisible to
          # `set -e` and mapfile itself returns 0, so a transient gh/API failure
          # would silently yield
          # zero refs -> "nothing to close" -> a GREEN job with the linked issue
          # still open — the exact #948 Bug A this workflow exists to prevent, now
          # with no red signal. Fail loud instead (mirrors the empty-output guard
          # already proven in auto-merge-enable.yml).
          #
          # Build the repo slug from `owner.login` + `name`, NOT `.nameWithOwner`:
          # the nested `repository` object on a closingIssuesReferences ref
          # (`gh pr view --json closingIssuesReferences`) only exposes
          # `{id, name, owner{login}}` — it has NO `nameWithOwner` field, so
          # interpolating that path resolves to the literal "null". That
          # made EVERY same-repo ref read as "null", trip the `$irepo != $REPO`
          # cross-repo guard, and get skipped with a warning under a GREEN job —
          # the issue left open (#948 Bug A class; live on #1013/#1015/#1037/#939,
          # systemic from #1021 which introduced the bogus field). The meta-test
          # only grepped the YAML text + reimplemented the rule in Python, so it
          # never exercised jq against real gh output and could not catch null.
          if ! refs=$(
            gh pr view "$PR_NUMBER" --repo "$REPO" \
              --json closingIssuesReferences \
              -q '.closingIssuesReferences[] | "\(.repository.owner.login)/\(.repository.name)\t\(.number)"'
          ); then
            echo "::error::gh pr view failed for #$PR_NUMBER — refusing to assume no linked issues (would leave them open, #948 Bug A)."
            exit 1
          fi
          if [ -z "$refs" ]; then
            echo "::notice::PR #$PR_NUMBER has no closing issue references — nothing to close."
            exit 0
          fi

          # Here-string (not a pipe) keeps the loop in the current shell so a
          # `gh issue close` failure is visible to the failed-flag below rather
          # than being swallowed by a subshell.
          failed=0
          while IFS=$'\t' read -r irepo n; do
            [ -n "$n" ] || continue
            # Foreign-repo guard: GITHUB_TOKEN is scoped to $REPO, so it cannot
            # close issues in another repo (a cross-repo `Closes owner/other#N`)
            # — and we must NOT collapse the ref into $REPO (that would close the
            # wrong same-numbered issue). An empty $irepo (malformed jq line) also
            # lands here and is skipped. Cross-repo close needs a wider-scoped
            # token (see #948); flag the gap loudly instead of failing silently.
            if [ "$irepo" != "$REPO" ]; then
              echo "::warning::Skipping cross-repo ref ${irepo:-<empty>}#$n — GITHUB_TOKEN is scoped to $REPO and cannot close issues in another repo (see #948)."
              continue
            fi
            state=$(gh issue view "$n" --repo "$irepo" --json state -q .state 2>/dev/null || echo "")
            if [ -z "$state" ]; then
              # Can't determine state (transient rate-limit / network). Skipping
              # silently here would leave the issue open under a GREEN job — the
              # same Bug A failure mode as a close failure (#1021). Record it so
              # the post-loop check fails the job (red signal -> retry), rather
              # than a false success that strands the issue open.
              echo "::error::Could not read $irepo#$n state — leaving for retry (failing job)."
              failed=1
              continue
            fi
            if [ "$state" = "CLOSED" ]; then
              echo "::notice::$irepo#$n already closed — skipping (idempotent)."
              continue
            fi

            # Reopen guard: respect a deliberate human reopen. If the issue was
            # reopened AFTER this PR merged, leave it open — do not re-close.
            #
            # `gh api --paginate -q '<jq>'` runs the jq filter ONCE PER PAGE and
            # streams results — it does NOT concatenate pages first. So an
            # aggregating expression (`[…] | last`) would emit one line PER PAGE
            # (the page-local last, or "" for pages with no reopen); on a
            # multi-page timeline `latest_reopen` would be multi-line / page-local
            # and the guard would misfire (#1021). Emit one timestamp per reopened
            # event across all pages, then take the chronologically latest with
            # `sort | tail -1` (ISO-8601 Z sorts lexicographically = chronologically)
            # — always a single line or empty.
            #
            # If the pipeline fails (rate limit, outage), latest_reopen="" — which
            # is indistinguishable from "no reopen events", so we fall through and
            # close. Safe default: close > leave-open (#948 is about issues stuck
            # OPEN). Do NOT "fix" the `|| echo ""` away without changing that bias.
            latest_reopen=$(
              gh api "repos/$irepo/issues/$n/timeline" --paginate \
                -q '.[] | select(.event=="reopened") | .created_at' \
                2>/dev/null | sort | tail -1 || echo ""
            )
            if [ -n "$latest_reopen" ] && [[ "$latest_reopen" > "$MERGED_AT" ]]; then
              echo "::notice::$irepo#$n reopened after PR #$PR_NUMBER merged ($MERGED_AT) — leaving open."
              continue
            fi

            # Don't let one close failure abort the loop under set -e and strand
            # the remaining issues unattempted. Record it and fail the job AFTER
            # attempting every issue (the `if` guard keeps set -e from aborting).
            if gh issue close "$n" --repo "$irepo" --reason completed \
                 --comment "$(printf 'Auto-closed on merge of %s#%s (%s).\nMerge SHA: `%s`\nNative linked-issue auto-close does not fire for automated merges (see #948); closed here.' "$REPO" "$PR_NUMBER" "$PR_TITLE" "$MERGE_SHA")"; then
              echo "::notice::Closed $irepo#$n (completed) via PR #$PR_NUMBER."
            else
              echo "::error::Failed to close $irepo#$n via PR #$PR_NUMBER."
              failed=1
            fi
          done <<< "$refs"

          if [ "$failed" -ne 0 ]; then
            echo "::error::One or more linked issues failed to close (see above) — #948 Bug A could recur; failing the job."
            exit 1
          fi
