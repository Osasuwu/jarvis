name: Issue Checks

# Combines: area label sync + schema validation + parent notification.
# One runner instead of up to three per issue event.

on:
  issues:
    types: [opened, edited, reopened, closed, labeled, unlabeled]

jobs:
  checks:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Area label sync
        if: contains(fromJson('["opened","edited","reopened"]'), github.event.action)
        uses: actions/github-script@v9
        with:
          script: |
            const issue = context.payload.issue;
            const body = issue.body || '';
            const currentLabels = (issue.labels || []).map(l => l.name || l);
            const repo = { owner: context.repo.owner, repo: context.repo.repo };

            const areaLabels = [
              'area:core-agent',
              'area:workflow-github',
              'area:tools',
              'area:quality',
              'area:docs',
              'area:release',
            ];

            function extractArea(text) {
              const match = text.match(/###\s*Area\s*\n\s*(area:[a-z\-]+)/i) ||
                            text.match(/###\s*Primary Area\s*\n\s*(area:[a-z\-]+)/i);
              return match ? match[1].toLowerCase() : null;
            }

            const area = extractArea(body);
            if (!area || !areaLabels.includes(area)) return;

            for (const label of currentLabels) {
              if (areaLabels.includes(label) && label !== area) {
                try {
                  await github.rest.issues.removeLabel({ ...repo, issue_number: issue.number, name: label });
                } catch (e) {
                  // Ignore if missing.
                }
              }
            }

            if (!currentLabels.includes(area)) {
              await github.rest.issues.addLabels({ ...repo, issue_number: issue.number, labels: [area] });
            }

      - name: Schema validation
        if: contains(fromJson('["opened","edited","reopened","labeled","unlabeled"]'), github.event.action)
        uses: actions/github-script@v9
        with:
          script: |
            function extractParentNumber(body) {
              if (!body) return null;
              const directMatch = body.match(/(?:^|\n)\s*(?:Parent|Part of):\s*#(\d+)/im);
              if (directMatch) return parseInt(directMatch[1], 10);
              const formPatterns = [
                /###\s*Parent Epic(?:\s*\(if tracked\)|\s*\(if sub-epic\))?\s*\n(?:.|\n){0,200}?#(\d+)\b/i,
                /###\s*Parent\s*\n(?:.|\n){0,200}?#(\d+)\b/i,
              ];
              for (const pattern of formPatterns) {
                const match = body.match(pattern);
                if (match) return parseInt(match[1], 10);
              }
              return null;
            }

            const issue = context.payload.issue;
            const body = issue.body || '';
            const labels = (issue.labels || []).map(l => l.name || l);
            const repo = { owner: context.repo.owner, repo: context.repo.repo };

            const isTask = labels.includes('task');
            const isEpic = labels.includes('epic');
            const isBug = labels.includes('bug');
            const isHotfix = labels.includes('priority:critical');

            const errors = [];
            let freshIssue = issue;
            try {
              const { data } = await github.rest.issues.get({ ...repo, issue_number: issue.number });
              freshIssue = data;
            } catch (e) {
              errors.push(`Unable to validate issue linkage via API: ${e.message}`);
            }

            // Parent link is recommended but not enforced — agile workflow allows standalone tasks.
            if (isTask && !isHotfix && !freshIssue.has_parent_issue) {
              console.log('Note: Task #' + issue.number + ' has no parent epic. Consider linking for traceability.');
            }

            if (isEpic) {
              if (!/##\s*Children/i.test(body) && !/###\s*Children/i.test(body)) {
                errors.push('Epic issues must include a Children section.');
              }
              if (!/-\s*\[[ xX]\]/.test(body)) {
                errors.push('Epic issues should list children as checkbox items (- [ ] #NNN description).');
              }
              if (extractParentNumber(body)) {
                errors.push('Epic issues must not have a parent epic reference. Use milestone + sub-issues with task/bug children.');
              }
            }

            if ((isTask || isBug) && !isHotfix && !issue.milestone) {
              console.log('Note: Task/bug #' + issue.number + ' has no milestone.');
            }

            if (errors.length > 0) {
              core.setFailed(errors.join('\n'));
            }

      - name: Parent notification
        if: contains(fromJson('["closed","reopened","edited"]'), github.event.action)
        uses: actions/github-script@v9
        with:
          script: |
            const currentIssue = context.payload.issue;
            const currentIssueNumber = currentIssue.number;
            const repo = { owner: context.repo.owner, repo: context.repo.repo };

            function getIssueNumberFromUrl(url) {
              if (!url) return null;
              const match = url.match(/\/issues\/(\d+)$/);
              return match ? parseInt(match[1], 10) : null;
            }

            async function getIssue(issueNumber) {
              const { data } = await github.rest.issues.get({ ...repo, issue_number: issueNumber });
              return data;
            }

            async function listSubIssues(parentNum) {
              const items = [];
              let page = 1;
              while (true) {
                const { data } = await github.request('GET /repos/{owner}/{repo}/issues/{issue_number}/sub_issues', {
                  ...repo, issue_number: parentNum, per_page: 100, page,
                });
                const batch = Array.isArray(data) ? data : [];
                items.push(...batch);
                if (batch.length < 100) break;
                page += 1;
              }
              return items;
            }

            const freshIssue = await getIssue(currentIssueNumber);
            const currentParent = getIssueNumberFromUrl(freshIssue.parent_issue_url || null);
            const targetParents = new Set();

            if (currentParent) targetParents.add(currentParent);
            if ((freshIssue.sub_issues_summary?.total || 0) > 0) targetParents.add(currentIssueNumber);

            if (targetParents.size === 0) {
              console.log('No parent/sub-issue relationship found, skipping.');
              return;
            }

            async function syncParentStatus(parentNum) {
              let parent;
              try {
                parent = await getIssue(parentNum);
              } catch (e) {
                console.log(`Parent #${parentNum} not found: ${e.message}`);
                return;
              }

              if (parent.state === 'closed') {
                console.log(`Parent #${parentNum} already closed, skipping.`);
                return;
              }

              const children = await listSubIssues(parentNum);
              const open = children.filter(i => i.state === 'open');
              const closed = children.filter(i => i.state === 'closed');

              if (open.length === 0 && closed.length > 0) {
                if (context.payload.action === 'closed' && currentParent === parentNum) {
                  await github.rest.issues.createComment({
                    ...repo,
                    issue_number: parentNum,
                    body: [
                      `All child issues (${closed.length}) are now closed.`,
                      '',
                      closed.map(c => `- #${c.number} ${c.title}`).join('\n'),
                      '',
                      'Please verify the Definition of Done and close this issue.',
                    ].join('\n'),
                  });
                }
                await github.rest.issues.addLabels({ ...repo, issue_number: parentNum, labels: ['status:children-done'] });
              } else {
                try {
                  await github.rest.issues.removeLabel({ ...repo, issue_number: parentNum, name: 'status:children-done' });
                } catch (e) {
                  // Ignore 404.
                }
                if (context.payload.action === 'closed' && currentParent === parentNum && open.length > 0) {
                  const total = open.length + closed.length;
                  await github.rest.issues.createComment({
                    ...repo,
                    issue_number: parentNum,
                    body: `#${currentIssueNumber} closed. Progress: ${closed.length}/${total} done (${open.length} remaining).`,
                  });
                }
              }
            }

            for (const parentNum of targetParents) {
              await syncParentStatus(parentNum);
            }
