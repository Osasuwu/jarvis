name: PR Body Check

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

jobs:
  require-linked-issue:
    runs-on: ubuntu-latest
    permissions:
      issues: read
      pull-requests: read
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            const repo = { owner: context.repo.owner, repo: context.repo.repo };
            const pr = context.payload.pull_request;
            const body = pr.body || '';
            const labels = (pr.labels || []).map(l => l.name);

            // Bot bypass: dependabot/renovate cannot author linked issues. Paperwork-only — pytest, gitleaks, meta-tests still gate.
            const author = (pr.user && pr.user.login) || '';
            if (author === 'dependabot[bot]' || author === 'renovate[bot]') {
              console.log(`bot author (${author}) — skipping linked-issue requirement.`);
              return;
            }

            // Hotfix escape: priority:critical label bypasses the linked-issue requirement.
            // Aligns with issue-checks.yml which treats priority:critical as hotfix.
            if (labels.includes('priority:critical')) {
              console.log('priority:critical label present — skipping linked-issue requirement (hotfix).');
              return;
            }

            // Fix-inline escape: [no-issue] body marker bypasses the requirement.
            // Mirrors the commit-msg convention in .pre-commit-config.yaml (#329) and
            // matches CLAUDE.md "Fix > track for trivial reversible (#428)" — drive-by
            // fixes shouldn't require filing a tracker just to satisfy paperwork.
            if (/\[no-issue\]/i.test(body)) {
              console.log('[no-issue] marker present — skipping linked-issue requirement (fix-inline per #428).');
              return;
            }

            // Refactor escape: conventional-commit `refactor:` / `refactor(scope):` title
            // bypasses the requirement. Refactors are usually structural cleanup with
            // no parent feature/bug issue; the [no-issue] marker is redundant paperwork
            // for this class. Same posture as #428 but auto-detected from title prefix.
            const title = pr.title || '';
            if (/^refactor(\([^)]*\))?:/i.test(title)) {
              console.log('refactor: title prefix — skipping linked-issue requirement.');
              return;
            }

            const issueMatches = [...body.matchAll(/(?:closes|fixes|resolves)\s+#(\d+)/gi)];
            const issueNumbers = [...new Set(issueMatches.map(m => parseInt(m[1], 10)))];

            if (issueNumbers.length === 0) {
              core.setFailed('PR body must include a linked issue reference (e.g. "Closes #123"), the [no-issue] marker for trivial fix-inline drive-bys (#428), or the priority:critical label for hotfixes.');
              return;
            }

            const errors = [];
            for (const issueNumber of issueNumbers) {
              try {
                await github.rest.issues.get({
                  ...repo,
                  issue_number: issueNumber,
                });
              } catch (e) {
                errors.push(`Linked issue #${issueNumber} does not exist or is not accessible.`);
              }
            }

            if (errors.length > 0) {
              core.setFailed(errors.join('\n'));
            }
