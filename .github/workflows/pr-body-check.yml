name: PR Body Check

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

jobs:
  require-linked-issue:
    runs-on: ubuntu-latest
    permissions:
      issues: read
      pull-requests: read
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const repo = { owner: context.repo.owner, repo: context.repo.repo };
            const body = context.payload.pull_request.body || '';
            const issueMatches = [...body.matchAll(/(?:closes|fixes|resolves)\s+#(\d+)/gi)];
            const issueNumbers = [...new Set(issueMatches.map(m => parseInt(m[1], 10)))];

            if (issueNumbers.length === 0) {
              core.setFailed('PR body must include a linked issue reference, e.g. "Closes #123".');
              return;
            }

            const errors = [];
            for (const issueNumber of issueNumbers) {
              try {
                await github.rest.issues.get({
                  ...repo,
                  issue_number: issueNumber,
                });
              } catch (e) {
                errors.push(`Linked issue #${issueNumber} does not exist or is not accessible.`);
              }
            }

            if (errors.length > 0) {
              core.setFailed(errors.join('\n'));
            }
