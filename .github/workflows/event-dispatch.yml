name: Event Dispatch

# Captures critical GitHub events and writes them to Supabase events table.
# The reactive-core orchestrator (wake_driver → agents/orchestrator router)
# consumes pending events and routes each to inline / task_queue / escalation.
#
# Required secrets:
#   SUPABASE_URL      — project URL (https://xxx.supabase.co)
#   SUPABASE_ANON_KEY — publishable anon key
#
# To add this to another repo (e.g. redrobot):
#   1. Copy this file to .github/workflows/event-dispatch.yml
#   2. Add the same SUPABASE_URL and SUPABASE_ANON_KEY secrets
#   3. Events from all repos land in the same events table

on:
  workflow_run:
    workflows:
      - "Gitleaks Secret Scanning"
      - "PR Body Check"
      - "PR Merged"
      - "Project Sync"
      - "Review Response"
    types: [completed]
    branches: [main]

  pull_request:
    types: [closed]
    branches: [main]

  pull_request_review:
    types: [submitted]

  # ── For Claude code-review bot's issue-comment verdicts (#633) ────
  # The bot posts review findings as a PR-issue comment (not via the
  # pull_request_review surface). This trigger lets us parse the verdict
  # and emit a canonical review_negative event from one place.
  issue_comment:
    types: [created]

jobs:
  # ── CI Failure on default branch ──────────────────────────────────
  ci-failure:
    if: >
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch CI failure event
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          REPO="${{ github.repository }}"
          WORKFLOW="${{ github.event.workflow_run.name }}"
          RUN_ID="${{ github.event.workflow_run.id }}"
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          SHA="${{ github.event.workflow_run.head_sha }}"
          URL="${{ github.event.workflow_run.html_url }}"

          curl -s -X POST "${SUPABASE_URL}/rest/v1/events" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{
              \"event_type\": \"ci_failure\",
              \"severity\": \"high\",
              \"repo\": \"${REPO}\",
              \"source\": \"github_action\",
              \"title\": \"CI failed: ${WORKFLOW} on ${BRANCH}\",
              \"payload\": {
                \"workflow\": \"${WORKFLOW}\",
                \"run_id\": ${RUN_ID},
                \"branch\": \"${BRANCH}\",
                \"sha\": \"${SHA}\",
                \"url\": \"${URL}\"
              },
              \"event_at\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
            }"

  # ── PR Approved ───────────────────────────────────────────────────
  pr-approved:
    if: >
      github.event_name == 'pull_request_review' &&
      github.event.review.state == 'approved' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch PR approved event
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          REPO="${{ github.repository }}"
          PR_NUM="${{ github.event.pull_request.number }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          REVIEWER="${{ github.event.review.user.login }}"
          PR_URL="${{ github.event.pull_request.html_url }}"

          # Escape double quotes in PR title
          PR_TITLE_ESCAPED=$(echo "$PR_TITLE" | sed 's/"/\\"/g')

          curl -s -X POST "${SUPABASE_URL}/rest/v1/events" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{
              \"event_type\": \"pr_approved\",
              \"severity\": \"info\",
              \"repo\": \"${REPO}\",
              \"source\": \"github_action\",
              \"title\": \"PR #${PR_NUM} approved by ${REVIEWER}\",
              \"payload\": {
                \"pr_number\": ${PR_NUM},
                \"pr_title\": \"${PR_TITLE_ESCAPED}\",
                \"reviewer\": \"${REVIEWER}\",
                \"url\": \"${PR_URL}\"
              },
              \"event_at\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
            }"

  # ── PR Merged ─────────────────────────────────────────────────────
  pr-merged:
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch PR merged event
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          REPO="${{ github.repository }}"
          PR_NUM="${{ github.event.pull_request.number }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          AUTHOR="${{ github.event.pull_request.user.login }}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          MERGE_SHA="${{ github.event.pull_request.merge_commit_sha }}"

          PR_TITLE_ESCAPED=$(echo "$PR_TITLE" | sed 's/"/\\"/g')

          curl -s -X POST "${SUPABASE_URL}/rest/v1/events" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{
              \"event_type\": \"pr_merged\",
              \"severity\": \"info\",
              \"repo\": \"${REPO}\",
              \"source\": \"github_action\",
              \"title\": \"PR #${PR_NUM} merged: ${PR_TITLE_ESCAPED}\",
              \"payload\": {
                \"pr_number\": ${PR_NUM},
                \"pr_title\": \"${PR_TITLE_ESCAPED}\",
                \"author\": \"${AUTHOR}\",
                \"merge_sha\": \"${MERGE_SHA}\",
                \"url\": \"${PR_URL}\"
              },
              \"event_at\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
            }"

  # ── CI Success on default branch (all checks passed) ─────────────
  ci-success:
    if: >
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch CI success event
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          REPO="${{ github.repository }}"
          WORKFLOW="${{ github.event.workflow_run.name }}"
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          URL="${{ github.event.workflow_run.html_url }}"

          curl -s -X POST "${SUPABASE_URL}/rest/v1/events" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{
              \"event_type\": \"ci_success\",
              \"severity\": \"low\",
              \"repo\": \"${REPO}\",
              \"source\": \"github_action\",
              \"title\": \"CI passed: ${WORKFLOW} on ${BRANCH}\",
              \"payload\": {
                \"workflow\": \"${WORKFLOW}\",
                \"branch\": \"${BRANCH}\",
                \"url\": \"${URL}\"
              },
              \"event_at\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
            }"

  # ── Review Negative: Human ────────────────────────────────────────
  # Emits a canonical review_negative row when a human reviewer requests
  # changes on an internal PR. Consumed by the orchestrator watcher
  # (scripts/orchestrator/watcher.py) — see PR #755 / issue #639 / PRD #41.
  #
  # Filter: state == 'changes_requested' only (the "request changes" signal).
  # 'commented' state carries no verdict and intentionally does NOT fire here.
  review-negative-human:
    if: >
      github.event_name == 'pull_request_review' &&
      github.event.review.state == 'changes_requested' &&
      github.event.review.user.type == 'User' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch review_negative event (human)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          REPO="${{ github.repository }}"
          PR_NUM="${{ github.event.pull_request.number }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          REVIEWER="${{ github.event.review.user.login }}"
          REVIEW_ID="${{ github.event.review.id }}"
          REVIEW_URL="${{ github.event.review.html_url }}"

          PR_TITLE_ESCAPED=$(echo "$PR_TITLE" | sed 's/"/\\"/g')

          curl -s -X POST "${SUPABASE_URL}/rest/v1/events" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{
              \"event_type\": \"review_negative\",
              \"severity\": \"medium\",
              \"repo\": \"${REPO}\",
              \"source\": \"github_action\",
              \"title\": \"PR #${PR_NUM} changes requested by ${REVIEWER}\",
              \"payload\": {
                \"pr_number\": ${PR_NUM},
                \"pr_title\": \"${PR_TITLE_ESCAPED}\",
                \"reviewer_kind\": \"human\",
                \"reviewer\": \"${REVIEWER}\",
                \"review_id\": ${REVIEW_ID},
                \"review_url\": \"${REVIEW_URL}\"
              },
              \"event_at\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
            }"

  # ── Review Negative: Claude code-review bot ───────────────────────
  # The Claude code-review plugin (Osasuwu/claude-plugins-official fork)
  # posts findings as an issue-comment, not via pull_request_review.
  # This job parses the verdict here in CI — the only fragile string-match
  # in the system per PRD #41 — so the orchestrator's filter stays
  # `event_type = 'review_negative'`, one stable predicate.
  #
  # Plugin output format (post-fork as of 2026-05-29):
  #   Header line is exactly `### Code review` (three #, lowercase 'r').
  #   Body line `Found N issues:` declares N actionable findings (the
  #   plugin already filters to confidence >= 80, so every one is real).
  #   `No issues found.` body → clean PR, no emit.
  #   Severity labels (CRITICAL / MAJOR / MINOR) are NOT emitted by the
  #   plugin — every surfaced issue is treated as actionable.
  #
  # The plugin also emits a SEPARATE `### Simplification opportunities`
  # comment when agent #10 finds informational opportunities. That header
  # is intentionally informational-only — this job ignores it so the
  # rework loop does not fire on simplification-only findings.
  #
  # Negative threshold: N >= 1 actionable issue. Maps to /rework convergence
  # target via n_issues. Back-compat fields n_critical / n_major / n_minor
  # preserved for downstream consumers; with the plugin we set
  # n_critical=N, n_major=0, n_minor=0 (every plugin issue is actionable).
  review-negative-claude-bot:
    if: >
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request != null &&
      github.event.comment.user.login == 'claude[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Parse Claude verdict and dispatch event
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          # Read comment body from the event payload (safe — no shell expansion of comment content)
          COMMENT_BODY="$(jq -r '.comment.body // ""' "$GITHUB_EVENT_PATH")"

          # Select the Claude code-review VERDICT comment. Match a heading-form
          # "Code Review" title ANYWHERE in the body (not just the first line),
          # case-insensitive, any heading level (1-6 #'s), optional "Claude"
          # prefix. Mirrors the merge gate's hardened selector (code-review.yml
          # -> "Verify review verdict", PR #960) so both surfaces recognize the
          # same deviant titles ("## Code Review", "## Claude Code Review", ...).
          # claude[bot] posts other comment kinds ("### Simplification
          # opportunities", /rework progress) that must NOT match here.
          # The old selector matched "### Code review" on the FIRST line only,
          # case-sensitive — the #961 miss: every deviant title was treated as
          # "not a review" and silently emitted no event, so the orchestrator
          # never fired /rework on those negative reviews.
          if ! printf '%s\n' "$COMMENT_BODY" \
              | grep -qiE '^#{1,6}[[:blank:]]*(Claude[[:blank:]]+)?Code[[:blank:]]+Review'; then
            echo "Not a Code Review verdict comment; skipping"
            exit 0
          fi

          # Findings signal #1 — severity-section headings. The bot routinely
          # deviates from the canonical "Found N issues:" line and posts severity
          # sections instead ("### MAJOR", "### MAJOR findings" #957, bare
          # "### MAJOR" #956, "### 🔴 BLOCKING" #954). Without this branch those
          # negative reviews emitted nothing and no /rework fired (#961).
          # Decoration between the #'s and the severity word is tolerated; a
          # trailing "findings"/"issues" suffix is optional.
          HAS_SEVERITY=false
          if printf '%s\n' "$COMMENT_BODY" \
              | grep -qiE '^#{1,6}[^[:alnum:]]*(CRITICAL|MAJOR|MINOR|BLOCKING)\b'; then
            HAS_SEVERITY=true
          fi

          # Findings signal #2 — the plugin's canonical findings line. Unanchored
          # (matches even if a deviant bot indents it), to mirror the merge gate.
          N_ISSUES=$(printf '%s\n' "$COMMENT_BODY" \
            | grep -oE 'Found [0-9]+ issues?:' \
            | head -1 \
            | grep -oE '[0-9]+' || true)

          # Findings are evaluated BEFORE the clean signal so a stray
          # "No issues found." line cannot shadow a real severity section.
          if [ "$HAS_SEVERITY" = false ] && { [ -z "$N_ISSUES" ] || [ "$N_ISSUES" -eq 0 ]; }; then
            # No findings signal. Either a clean review ("No issues found.") or an
            # unrecognized format. Unlike the merge gate this job CANNOT
            # fail-closed — orchestrator events have no safe default verdict — so
            # it no-ops. Safe: the merge gate itself fails-closed on unrecognized
            # comments and blocks the merge, so a missed event never causes a bad
            # merge, only a missed proactive /rework. A distinct
            # review_unparseable event (#961 Option B) is deferred until the
            # reactive-core orchestrator (M44) has a triage consumer.
            if printf '%s\n' "$COMMENT_BODY" | grep -qE '^No issues found\.'; then
              echo "Clean review (No issues found); not emitting review_negative"
            else
              echo "::warning::Code Review verdict comment matched no findings/clean signal; not emitting (see #961 Option B)"
            fi
            exit 0
          fi

          # At least one findings signal present -> negative review. If the
          # canonical Found-N line is absent (severity-only deviant), fall back to
          # N=1 (>=1 actionable; /rework re-parses the comment for the exact set).
          if [ -z "$N_ISSUES" ] || [ "$N_ISSUES" -eq 0 ]; then
            N_ISSUES=1
          fi

          # Back-compat: downstream consumers (orchestrator watcher, /rework)
          # still read n_critical / n_major / n_minor from earlier schema.
          # Plugin output has no severity split, so map all to n_critical.
          N_CRITICAL=$N_ISSUES
          N_MAJOR=0
          N_MINOR=0

          REPO="${{ github.repository }}"
          PR_NUM="${{ github.event.issue.number }}"
          PR_TITLE="${{ github.event.issue.title }}"
          COMMENT_ID="${{ github.event.comment.id }}"
          COMMENT_URL="${{ github.event.comment.html_url }}"

          PR_TITLE_ESCAPED=$(echo "$PR_TITLE" | sed 's/"/\\"/g')

          ISSUE_WORD="issues"
          if [ "$N_ISSUES" -eq 1 ]; then ISSUE_WORD="issue"; fi

          curl -s -X POST "${SUPABASE_URL}/rest/v1/events" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{
              \"event_type\": \"review_negative\",
              \"severity\": \"medium\",
              \"repo\": \"${REPO}\",
              \"source\": \"github_action\",
              \"title\": \"PR #${PR_NUM} — Claude code-review: ${N_ISSUES} ${ISSUE_WORD}\",
              \"payload\": {
                \"pr_number\": ${PR_NUM},
                \"pr_title\": \"${PR_TITLE_ESCAPED}\",
                \"reviewer_kind\": \"claude_bot\",
                \"comment_id\": ${COMMENT_ID},
                \"comment_url\": \"${COMMENT_URL}\",
                \"n_issues\": ${N_ISSUES},
                \"n_critical\": ${N_CRITICAL},
                \"n_major\": ${N_MAJOR},
                \"n_minor\": ${N_MINOR}
              },
              \"event_at\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
            }"
