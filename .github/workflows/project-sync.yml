name: Project Sync

# Built-in project workflows should handle:
# - auto-add issue/PR items
# - closed item -> Done
# This workflow keeps only the delta:
# - issue reopened -> Todo
# - status/priority/area/phase sync from labels and milestone
# - PR opened/reopened/ready_for_review -> In Progress

on:
  issues:
    types: [reopened, labeled, unlabeled, milestoned, demilestoned]
  pull_request:
    types: [opened, reopened, ready_for_review]

env:
  PROJECT_OWNER: Osasuwu
  PROJECT_NUMBER: "3"
  PROJECT_ID: "PVT_kwHOCQcMGs4BSPd1"

  STATUS_FIELD_ID: "PVTSSF_lAHOCQcMGs4BSPd1zg_1YYQ"
  AREA_FIELD_ID: "PVTSSF_lAHOCQcMGs4BSPd1zg_1swk"
  PHASE_FIELD_ID: "PVTSSF_lAHOCQcMGs4BSPd1zg_1swg"
  PRIORITY_FIELD_ID: "PVTSSF_lAHOCQcMGs4BSPd1zg_1sug"

  STATUS_TODO_OPTION: "f75ad846"
  STATUS_IN_PROGRESS_OPTION: "47fc9ee4"
  STATUS_DONE_OPTION: "98236657"

  PRIORITY_CRITICAL_OPTION: "adbf738e"
  PRIORITY_HIGH_OPTION: "ea606f7c"
  PRIORITY_MEDIUM_OPTION: "5b0c1aab"
  PRIORITY_LOW_OPTION: "f991b94a"

  PHASE_P1_OPTION: "207a1be9"
  PHASE_P2_OPTION: "5af065f7"
  PHASE_P3_OPTION: "77618227"
  PHASE_P4_OPTION: "7ec1d668"
  PHASE_P5_OPTION: "c34ac8d8"

  AREA_CORE_AGENT_OPTION: "3585dbdd"
  AREA_WORKFLOW_GITHUB_OPTION: "7567e8d6"
  AREA_TOOLS_OPTION: "fdf66f92"
  AREA_QUALITY_OPTION: "6ac7cb0a"
  AREA_DOCS_OPTION: "832ed0e1"
  AREA_RELEASE_OPTION: "2935165f"

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      issues: read
      pull-requests: read
    env:
      GH_TOKEN: ${{ secrets.PROJECT_SYNC != '' && secrets.PROJECT_SYNC || github.token }}
    steps:
      - name: Sync issue fields
        if: ${{ github.event_name == 'issues' }}
        env:
          CONTENT_NODE_ID: ${{ github.event.issue.node_id }}
          LABELS_JSON: ${{ toJson(github.event.issue.labels.*.name) }}
          MILESTONE_TITLE: ${{ github.event.issue.milestone.title || '' }}
          ISSUE_ACTION: ${{ github.event.action }}
        run: |
          set -euo pipefail

          if [ -z "${CONTENT_NODE_ID}" ]; then
            echo "Missing issue node ID, skipping."
            exit 0
          fi

          project_id=$(gh api graphql -f query='query($owner: String!, $number: Int!) { user(login: $owner) { projectV2(number: $number) { id } } }' -f owner="${PROJECT_OWNER}" -F number="${PROJECT_NUMBER}" --jq '.data.user.projectV2.id')

          item_id=$(gh api graphql -f query='query($contentId: ID!) { node(id: $contentId) { ... on Issue { projectItems(first: 20) { nodes { id project { id } } } } } }' -f contentId="${CONTENT_NODE_ID}" --jq --arg pid "$project_id" '.data.node.projectItems.nodes[] | select(.project.id == $pid) | .id' | head -n1 || true)

          if [ -z "$item_id" ]; then
            echo "Issue is not in target project, skipping."
            exit 0
          fi

          echo "Resolved issue item id: $item_id"

          priority_label=$(echo "${LABELS_JSON}" | jq -r '.[] | select(startswith("priority:"))' | head -n1)
          area_label=$(echo "${LABELS_JSON}" | jq -r '.[] | select(startswith("area:"))' | head -n1)
          status_label=$(echo "${LABELS_JSON}" | jq -r '.[] | select(startswith("status:"))' | head -n1)

          status_option=""
          case "${ISSUE_ACTION}" in
            reopened)
              status_option="${STATUS_TODO_OPTION}"
              ;;
            *)
              case "${status_label}" in
                status:in-progress|status:review)
                  status_option="${STATUS_IN_PROGRESS_OPTION}"
                  ;;
                status:children-done)
                  status_option="${STATUS_DONE_OPTION}"
                  ;;
                *)
                  status_option="${STATUS_TODO_OPTION}"
                  ;;
              esac
              ;;
          esac

          priority_option=""
          case "${priority_label}" in
            priority:critical)
              priority_option="${PRIORITY_CRITICAL_OPTION}"
              ;;
            priority:high)
              priority_option="${PRIORITY_HIGH_OPTION}"
              ;;
            priority:medium)
              priority_option="${PRIORITY_MEDIUM_OPTION}"
              ;;
            priority:low)
              priority_option="${PRIORITY_LOW_OPTION}"
              ;;
          esac

          area_option=""
          case "${area_label}" in
            area:core-agent)
              area_option="${AREA_CORE_AGENT_OPTION}"
              ;;
            area:workflow-github)
              area_option="${AREA_WORKFLOW_GITHUB_OPTION}"
              ;;
            area:tools)
              area_option="${AREA_TOOLS_OPTION}"
              ;;
            area:quality)
              area_option="${AREA_QUALITY_OPTION}"
              ;;
            area:docs)
              area_option="${AREA_DOCS_OPTION}"
              ;;
            area:release)
              area_option="${AREA_RELEASE_OPTION}"
              ;;
          esac

          phase_option=""
          case "${MILESTONE_TITLE}" in
            "P1 Foundation")
              phase_option="${PHASE_P1_OPTION}"
              ;;
            "P2 PM+TechLead MVP")
              phase_option="${PHASE_P2_OPTION}"
              ;;
            "P3 Reliability")
              phase_option="${PHASE_P3_OPTION}"
              ;;
            "P4 Capability Expansion")
              phase_option="${PHASE_P4_OPTION}"
              ;;
            "P5 Stabilization")
              phase_option="${PHASE_P5_OPTION}"
              ;;
          esac

          if [ -n "${status_option}" ]; then
            gh project item-edit --id "$item_id" --project-id "$project_id" --field-id "${STATUS_FIELD_ID}" --single-select-option-id "${status_option}"
          fi

          if [ -n "${priority_option}" ]; then
            gh project item-edit --id "$item_id" --project-id "$project_id" --field-id "${PRIORITY_FIELD_ID}" --single-select-option-id "${priority_option}"
          fi

          if [ -n "${area_option}" ]; then
            gh project item-edit --id "$item_id" --project-id "$project_id" --field-id "${AREA_FIELD_ID}" --single-select-option-id "${area_option}"
          fi

          if [ -n "${phase_option}" ]; then
            gh project item-edit --id "$item_id" --project-id "$project_id" --field-id "${PHASE_FIELD_ID}" --single-select-option-id "${phase_option}"
          fi

      - name: Set PR status to In Progress
        if: ${{ github.event_name == 'pull_request' }}
        env:
          ITEM_URL: ${{ github.event.pull_request.html_url }}
          CONTENT_NODE_ID: ${{ github.event.pull_request.node_id }}
        run: |
          set -euo pipefail

          if [ -z "${ITEM_URL}" ] || [ -z "${CONTENT_NODE_ID}" ]; then
            echo "Missing PR URL or node ID, skipping."
            exit 0
          fi

          # Keep this resilient if built-in auto-add is disabled.
          gh project item-add "${PROJECT_NUMBER}" --owner "${PROJECT_OWNER}" --url "${ITEM_URL}" >/dev/null 2>&1 || true

          project_id=$(gh api graphql -f query='query($owner: String!, $number: Int!) { user(login: $owner) { projectV2(number: $number) { id } } }' -f owner="${PROJECT_OWNER}" -F number="${PROJECT_NUMBER}" --jq '.data.user.projectV2.id')

          item_id=$(gh api graphql -f query='query($contentId: ID!) { node(id: $contentId) { ... on PullRequest { projectItems(first: 20) { nodes { id project { id } } } } } }' -f contentId="${CONTENT_NODE_ID}" --jq --arg pid "$project_id" '.data.node.projectItems.nodes[] | select(.project.id == $pid) | .id' | head -n1 || true)

          if [ -z "$item_id" ]; then
            echo "PR is not in target project, skipping."
            exit 0
          fi

          gh project item-edit --id "$item_id" --project-id "$project_id" --field-id "${STATUS_FIELD_ID}" --single-select-option-id "${STATUS_IN_PROGRESS_OPTION}"
