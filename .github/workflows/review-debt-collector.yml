name: Review Debt Collector

# Collects sub-MAJOR (MEDIUM/INFO) code-review findings on each merged PR,
# persists them to the `review_debt` Supabase table with weighted dedup,
# clusters by parent-directory module_area, and auto-files ONE
# `review-debt-cluster` issue when a cluster crosses the threshold (#1211).
#
# Deterministic — no LLM. The heavy lifting lives in
# scripts/review_debt_collector.py (pure core unit-tested in
# tests/infrastructure/test_review_debt_collector.py; contract pinned by
# tests/ci/test_review_debt_collector_guard.py per #326).
#
# Required secrets:
#   SUPABASE_URL      — project URL (https://xxx.supabase.co)
#   SUPABASE_ANON_KEY — publishable anon key (review_debt RLS allows anon)

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  collect:
    # Only merged PRs — a closed-unmerged PR surfaced no shipped debt.
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    # AC9: bounded + fail-loud. No continue-on-error — a crash goes red so a
    # silent death is visible; the heartbeat row is the positive liveness signal.
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime deps
        run: pip install --quiet httpx

      - name: Fetch latest code-review comment body
        id: review
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          # The Claude code-review bot posts findings as a PR-issue comment
          # (not via the pull_request_review surface). Take the LAST comment
          # whose first heading is a "(Claude )Code Review" title — same
          # selector as code-review.yml / event-dispatch.yml. Write to a file
          # so the collector never shell-expands untrusted comment content.
          gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
            --paginate --jq '.[].body' > /tmp/all_comments.txt || true
          python - <<'PY'
          import os, re
          raw = open("/tmp/all_comments.txt", encoding="utf-8").read()
          # Comments are concatenated bodies; split on the title heading and keep
          # the last section that starts with a code-review title.
          title = re.compile(r"^#{1,6}[ \t]*(?:Claude[ \t]+)?Code[ \t]+Review", re.I | re.M)
          matches = list(title.finditer(raw))
          body = raw[matches[-1].start():] if matches else ""
          with open("/tmp/review_body.txt", "w", encoding="utf-8") as fh:
              fh.write(body)
          print(f"review-debt: captured {len(body)} chars of review comment")
          PY

      - name: Collect + cluster review debt
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_REF: ${{ github.repository }}#${{ github.event.pull_request.number }}
          REVIEW_COMMENT_BODY_FILE: /tmp/review_body.txt
        run: python scripts/review_debt_collector.py
