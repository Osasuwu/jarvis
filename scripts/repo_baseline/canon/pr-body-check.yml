# repo-baseline canon — pr-body-check.yml (require-linked-issue guard)
name: PR Body Check

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

jobs:
  require-linked-issue:
    runs-on: {{ runs_on }}
    permissions:
      issues: read
      pull-requests: read
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            const repo = { owner: context.repo.owner, repo: context.repo.repo };
            const pr = context.payload.pull_request;
            const body = pr.body || '';
            const labels = (pr.labels || []).map(l => l.name);

            // Bot bypass: dependabot/renovate cannot author linked issues.
            const author = (pr.user && pr.user.login) || '';
            if (author === 'dependabot[bot]' || author === 'renovate[bot]') {
              console.log(`bot author (${author}) — skipping linked-issue requirement.`);
              return;
            }

            // Hotfix escape: priority:critical label bypasses the linked-issue requirement.
            if (labels.includes('priority:critical')) {
              console.log('priority:critical label present — skipping linked-issue requirement (hotfix).');
              return;
            }

            // Fix-inline escape: [no-issue] body marker bypasses the requirement.
            if (/\[no-issue\]/i.test(body)) {
              console.log('[no-issue] marker present — skipping linked-issue requirement (fix-inline per #428).');
              return;
            }

            // Refactor escape: conventional-commit `refactor:` / `refactor(scope):` title
            // bypasses the requirement.
            const title = pr.title || '';
            if (/^refactor(\([^)]*\))?:/i.test(title)) {
              console.log('refactor: title prefix — skipping linked-issue requirement.');
              return;
            }

            const issueMatches = [...body.matchAll(/(?:closes|fixes|resolves)\s+#(\d+)/gi)];
            const issueNumbers = [...new Set(issueMatches.map(m => parseInt(m[1], 10)))];

            if (issueNumbers.length === 0) {
              core.setFailed('PR body must include a linked issue reference (e.g. "Closes #123"), the [no-issue] marker for trivial fix-inline drive-bys, or the priority:critical label for hotfixes.');
              return;
            }

            const errors = [];
            for (const issueNumber of issueNumbers) {
              try {
                await github.rest.issues.get({
                  ...repo,
                  issue_number: issueNumber,
                });
              } catch (e) {
                errors.push(`Linked issue #${issueNumber} does not exist or is not accessible.`);
              }
            }

            if (errors.length > 0) {
              core.setFailed(errors.join('\n'));
            }
