# repo-baseline canon — ci-meta.yml (Guard Fixture Tests)
# Runs the meta-test suite that validates path-filtered CI guards (#326).
# Deliberately NOT path-filtered — the whole point is detecting wrong filters.
name: CI Meta — Guard Fixture Tests

on:
  pull_request:
    types: [opened, reopened, synchronize]
  push:
    branches: [main]

jobs:
  meta-tests:
    runs-on: {{ runs_on }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pyyaml

      - name: Run meta-tests
        run: pytest tests/ci/ -v
